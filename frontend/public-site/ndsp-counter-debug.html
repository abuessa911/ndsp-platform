<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NDSP Counter Debug</title>
  <style>
    body{font-family:system-ui;background:#05060a;color:#f5d787;padding:24px;line-height:1.8}
    pre{background:#111827;color:#d1fae5;padding:16px;border-radius:12px;overflow:auto}
    .ok{color:#22c55e}.bad{color:#ef4444}
  </style>
</head>
<body>
  <h1>NDSP Counter Debug</h1>
  <p>هذه الصفحة تقرأ مباشرة من API الرسمي.</p>
  <pre id="out">Loading...</pre>
  <script>
    fetch('/api/trial/status?v=' + Date.now(), {cache:'no-store'})
      .then(r => r.json())
      .then(d => {
        document.getElementById('out').textContent = JSON.stringify(d, null, 2);
      })
      .catch(e => {
        document.getElementById('out').textContent = 'FAILED: ' + e.message;
      });
  </script>


<!-- NDSP_LIVE_TRIAL_COUNTERS_START -->
<script src="/ndsp-live-trial-counters.js?v=20260606_100138" defer></script>
<!-- NDSP_LIVE_TRIAL_COUNTERS_END -->
</body>
</html>
