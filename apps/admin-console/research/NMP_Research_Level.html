<!-- DSP_ADMIN_ARABIC_FINAL_BEGIN -->
<style>
#dspAdminLangFinal{position:fixed;top:12px;right:12px;z-index:999999;display:flex;gap:6px;padding:6px;border-radius:999px;background:rgba(7,10,16,.94);border:1px solid rgba(217,182,90,.45)}
#dspAdminLangFinal button{border:0;border-radius:999px;padding:8px 12px;font-parameter:900;background:transparent;color:#9AA6BC}
#dspAdminLangFinal button.on{background:linear-gradient(135deg,#F2D27A,#D9B65A);color:#151006}
</style>
<script>
(function(){
const AR={
"OPERATIONS CENTER":"مركز العمليات","MAIN":"الرئيسية","Overview":"نظرة عامة","Users":"المستخدمون","Trials":"التجارب",
"Registration Review":"مراجعة التسجيل","BUSINESS":"الأعمال","Packages":"الباقات","Payments":"المدفوعات",
"ENGINE & GOVERNANCE":"المحركات والحوكمة","Layer Governance":"حوكمة الطبقات","NMP Research Lab":"مختبر أبحاث NMP",
"Alerts & Config":"التنبيهات والإعدادات","Email":"البريد","Telegram":"تيليجرام","Health":"الصحة التشغيلية","Reports":"التقارير",
"Backups":"النسخ الاحتياطية","Status":"الحالة","Active":"نشط","Pending":"قيد الانتظار","Approved":"مقبول","Rejected":"مرفوض"
};
const EN={}; Object.keys(AR).forEach(k=>EN[AR[k]]=k);
function walk(fn){let w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT);let n,a=[];while(n=w.nextNode())a.push(n);a.forEach(n=>{if(n.parentElement&& !n.parentElement.closest("#dspAdminLangFinal"))fn(n)});}
function apply(lang){
 localStorage.setItem("dsp_admin_lang",lang);
 document.documentElement.lang=lang; document.documentElement.dir=lang==="ar"?"rtl":"ltr"; document.body.dir=document.documentElement.dir;
 let map=lang==="ar"?AR:EN;
 walk(n=>{let t=n.nodeValue;Object.keys(map).forEach(k=>t=t.split(k).join(map[k]));n.nodeValue=t;});
 document.getElementById("adAR")?.classList.toggle("on",lang==="ar");
 document.getElementById("adEN")?.classList.toggle("on",lang==="en");
}
function boot(){
 if(!document.getElementById("dspAdminLangFinal")){
  let b=document.createElement("div"); b.id="dspAdminLangFinal";
  b.innerHTML='<button id="adAR">AR</button><button id="adEN">EN</button>';
  document.body.appendChild(b);
  document.getElementById("adAR").onclick=()=>apply("ar");
  document.getElementById("adEN").onclick=()=>apply("en");
 }
 apply(localStorage.getItem("dsp_admin_lang")||"ar");
}
document.readyState==="loading"?document.addEventListener("DOMContentLoaded",boot):boot();
})();
</script>
<!-- DSP_ADMIN_ARABIC_FINAL_END -->

<!-- DSP_ADMIN_MOBILE_HARD_DRAWER_BEGIN -->
<style>
@media(max-width:900px){
  #dspHardMenuBtn{
    position:fixed!important;
    top:12px!important;
    left:12px!important;
    z-index:2147483647!important;
    width:46px!important;
    height:46px!important;
    border-radius:14px!important;
    border:1px solid rgba(217,182,90,.55)!important;
    background:#070A10!important;
    color:#F2D27A!important;
    font-size:24px!important;
    font-parameter:900!important;
  }
  #dspHardBackdrop{
    position:fixed!important;
    inset:0!important;
    z-index:2147483645!important;
    display:none!important;
    background:rgba(0,0,0,.72)!important;
    backdrop-filter:blur(6px)!important;
  }
  body.dspHardOpen #dspHardBackdrop{display:block!important}
  body.dspHardOpen .dspHardSidebar{
    transform:translateX(0)!important;
    opacity:1!important;
    pointer-events:auto!important;
  }
  .dspHardSidebar{
    position:fixed!important;
    top:0!important;
    left:0!important;
    bottom:0!important;
    width:min(86vw,360px)!important;
    height:100vh!important;
    max-height:100vh!important;
    overflow-y:auto!important;
    z-index:2147483646!important;
    background:#0B0F17!important;
    transform:translateX(-115%)!important;
    opacity:1!important;
    pointer-events:none!important;
    transition:transform .22s ease!important;
    box-shadow:32px 0 90px rgba(0,0,0,.65)!important;
  }
  body:not(.dspHardOpen) .dspHardSidebar *{
    pointer-events:none!important;
  }
}
</style>

<script>
(function(){
  function mobile(){ return window.matchMedia("(max-width:900px)").matches; }

  function isSidebar(el){
    var t=(el.innerText||"").trim();
    if(t.length<40) return false;
    var hits=0;
    ["Overview","Users","Trials","Registration Review","Packages","Payments","Layer Governance","NMP Research Lab","Health","Reports","Backups","نظرة عامة","المستخدمون","التجارب","الباقات","المدفوعات"].forEach(function(x){
      if(t.indexOf(x)>=0) hits++;
    });
    return hits>=4;
  }

  function findSidebar(){
    var all=[].slice.call(document.querySelectorAll("aside,nav,div,section"));
    var c=all.filter(isSidebar);
    c.sort(function(a,b){
      var aw=a.getBoundingClientRect().width || 9999;
      var bw=b.getBoundingClientRect().width || 9999;
      return aw-bw;
    });
    return c[0] || null;
  }

  function boot(){
    document.querySelectorAll("#dspAdminDrawerBtn,#dspAdminDrawerBackdrop,#dspAdminMobileBackdrop").forEach(function(x){x.remove();});
    document.body.classList.remove("dspDrawerOpen","dsp-admin-menu-open");

    var side=findSidebar();
    if(!side) return;

    side.classList.add("dspHardSidebar");

    if(!document.getElementById("dspHardBackdrop")){
      var back=document.createElement("div");
      back.id="dspHardBackdrop";
      document.body.appendChild(back);
      back.onclick=function(){document.body.classList.remove("dspHardOpen");};
    }

    if(!document.getElementById("dspHardMenuBtn")){
      var btn=document.createElement("button");
      btn.id="dspHardMenuBtn";
      btn.type="button";
      btn.textContent="☰";
      document.body.appendChild(btn);
      btn.onclick=function(){document.body.classList.toggle("dspHardOpen");};
    }

    side.querySelectorAll("a,button").forEach(function(el){
      if(!el.dataset.hardClose){
        el.dataset.hardClose="1";
        el.addEventListener("click",function(){
          if(mobile()) setTimeout(function(){document.body.classList.remove("dspHardOpen");},120);
        });
      }
    });

    if(mobile()) document.body.classList.remove("dspHardOpen");
  }

  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",boot);
  else boot();

  setTimeout(boot,300);
  setTimeout(boot,1000);
  window.addEventListener("resize",boot);
})();
</script>
<!-- DSP_ADMIN_MOBILE_HARD_DRAWER_END -->

<!-- NDSP_AR_EN_ONLY_CLEAN_FINAL_START -->
<script>
(function(){
  "use strict";

  function n(v){ return String(v || "").trim().toLowerCase(); }

  function allowed(v){
    v = n(v);
    return v === "ar" || v === "en" || v.indexOf("ar-") === 0 || v.indexOf("en-") === 0 ||
           v === "arabic" || v === "english" || v === "العربية";
  }

  function isLangSelect(sel){
    var meta = n((sel.id || "") + " " + (sel.name || "") + " " + (sel.className || "") + " " + (sel.getAttribute("aria-label") || ""));
    var text = n(sel.textContent || "");
    return /lang|language|locale|لغة|لسان/.test(meta) || /العربية|english|arabic/.test(text);
  }

  function cleanSelect(sel){
    if (!sel || !sel.options || !isLangSelect(sel)) return;

    Array.prototype.slice.call(sel.options).forEach(function(o){
      var v = n(o.value || "");
      var t = n(o.textContent || "");
      if (!allowed(v) && !allowed(t)) o.remove();
    });

    var opts = Array.prototype.slice.call(sel.options);
    var hasAr = opts.some(function(o){ return n(o.value) === "ar" || n(o.textContent).indexOf("العربية") >= 0; });
    var hasEn = opts.some(function(o){ return n(o.value) === "en" || n(o.textContent).indexOf("english") >= 0; });

    if (!hasAr) {
      var ar = document.createElement("option");
      ar.value = "ar";
      ar.textContent = "العربية";
      sel.appendChild(ar);
    }

    if (!hasEn) {
      var en = document.createElement("option");
      en.value = "en";
      en.textContent = "English";
      sel.appendChild(en);
    }
  }

  function enforce(){
    window.NDSP_ALLOWED_LANGUAGES = ["ar","en"];
    document.documentElement.setAttribute("data-allowed-languages", "ar,en");
    Array.prototype.slice.call(document.querySelectorAll("select")).forEach(cleanSelect);

    Array.prototype.slice.call(document.querySelectorAll("[data-lang], [data-language], [data-locale]")).forEach(function(el){
      var v = n(el.getAttribute("data-lang") || el.getAttribute("data-language") || el.getAttribute("data-locale") || "");
      if (v && !allowed(v)) el.remove();
    });
  }

  document.addEventListener("DOMContentLoaded", enforce);
  setTimeout(enforce, 300);
  setTimeout(enforce, 1200);
})();
</script>
<!-- NDSP_AR_EN_ONLY_CLEAN_FINAL_END -->

</body>
<div class="wrap">
  <div class="card">
    <div class="badge">TEMP_RESEARCH_RESULT</div>
    <h1>مستوى NMP البحثي</h1>
    <div class="grid">
      <div class="item"><div class="k">الأصل</div><div class="v" id="symbol">—</div></div>
      <div class="item"><div class="k">الإطار</div><div class="v" id="timeframe">—</div></div>
      <div class="item"><div class="k">المستوى</div><div class="v" id="level">قيد البحث</div></div>
      <div class="item"><div class="k">الصيغة المؤقتة</div><div class="v" id="internal method">—</div></div>
    </div>
    <div class="notice" id="notice">
      هذا المستوى ناتج من مختبر NMP Research Lab، وهو قيد البحث ولم يعتمد كصيغة نهائية بعد.
    </div>
  </div>
</div>
<script>
fetch("./nmp-research-level-latest.json",{cache:"no-store"})
.then(r=>r.json())
.then(d=>{
 document.getElementById("symbol").textContent=d.symbol||"—";
 document.getElementById("timeframe").textContent=d.timeframe||"—";
 document.getElementById("level").textContent=(d.nmp_research_level===null||d.nmp_research_level===undefined)?"قيد البحث":d.nmp_research_level;
 document.getElementById("internal method").textContent=d.internal method_candidate||"—";
 document.getElementById("notice").textContent=d.user_notice_ar||document.getElementById("notice").textContent;
})
.catch(()=>{});
</script>
